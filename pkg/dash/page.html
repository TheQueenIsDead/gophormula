<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Gophormula</title>
  <script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@main/bundles/datastar.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body   { display: flex; flex-direction: column; height: 100vh; font-family: monospace; background: #111; color: #eee; }
    header { padding: .75rem 1.25rem; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 1rem; }
    h1     { color: #e10600; font-size: 1.2rem; letter-spacing: .05em; flex-shrink: 0; }
    #active-session { color: #888; font-size: .8rem; flex-shrink: 0; }
    #status-time { font-size: 1.3rem; font-weight: bold; color: #fff; letter-spacing: .05em; flex-shrink: 0; }
    #status-remaining { font-size: .8rem; color: #666; }
    .status-bar { margin-left: auto; display: flex; align-items: center; gap: 1.25rem; font-size: .75rem; color: #888; }
    .status-item { white-space: nowrap; }
    .status-label { color: #444; margin-right: .3rem; text-transform: uppercase; font-size: .65rem; letter-spacing: .08em; }
    .status-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; vertical-align: middle; position: relative; }
    .status-dot::after { content: attr(data-tip); display: none; position: absolute; top: calc(100% + 6px); left: 50%; transform: translateX(-50%);
      background: #222; color: #ccc; font-size: .7rem; padding: 3px 7px; border-radius: 3px; white-space: nowrap; border: 1px solid #333; pointer-events: none; }
    .status-dot:hover::after { display: block; }
    .layout { display: flex; flex: 1; overflow: hidden; min-height: 0; }

    /* Left session sidebar */
    #sessions-aside { width: 220px; border-right: 1px solid #222; overflow-y: auto; padding: .5rem; flex-shrink: 0; }
    #sessions-aside h2 { font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; color: #555; padding: .5rem .25rem .25rem; }
    .session-btn { display: block; width: 100%; text-align: left; background: none; border: none; color: #ccc;
                   padding: .4rem .5rem; cursor: pointer; font: inherit; font-size: .8rem; border-radius: 3px; }
    .session-btn:hover { background: #1e1e1e; color: #fff; }
    .session-btn-live { color: #e10600; border: 1px solid #3a0000; margin-bottom: .25rem; }
    .session-btn-live:hover { background: #1a0000; color: #ff3320; }

    /* Main content */
    main   { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
    #plot-panel { flex: 1; min-height: 0; border-bottom: 1px solid #222; background: #0a0a0a; overflow: hidden; }
    #track-plot { display: block; width: 100%; height: 100%; }
    #log-panel { height: 200px; flex-shrink: 0; display: flex; flex-direction: column; overflow: hidden; transition: height .2s ease; }
    #log-panel.collapsed { height: 28px; }
    #log-panel.collapsed #log { display: none; }
    #log-panel h2 { font-size: .75rem; text-transform: uppercase; letter-spacing: .1em; color: #555; padding: .6rem 1rem; border-bottom: 1px solid #1a1a1a; flex-shrink: 0; display: flex; align-items: center; cursor: pointer; user-select: none; }
    #log-toggle { margin-left: auto; font-size: .7rem; color: #444; }
    #log-panel.collapsed h2 { border-bottom: none; }
    #log   { flex: 1; min-height: 0; overflow-y: auto; padding: .25rem; }
    .entry { padding: 3px 8px; font-size: .8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 2px solid #222; margin-bottom: 2px; }
    .entry .ts   { color: #555; margin-right: .6rem; }
    .entry .body { color: #ddd; }

    /* Right standings sidebar */
    #standings-aside { width: 180px; border-left: 1px solid #222; overflow-y: auto; padding: .5rem; flex-shrink: 0; }
    #standings-aside h2 { font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; color: #555; padding: .5rem .25rem .4rem; }
    #standings-panel { display: flex; flex-direction: column; gap: 1px; }
    .sr { display: flex; align-items: center; gap: .35rem; padding: .25rem .4rem; border-radius: 2px; font-size: .75rem; border-left: 3px solid #333; }
    .sr-out { opacity: .4; }
    .sr-pos { width: 1.4rem; text-align: right; color: #555; flex-shrink: 0; font-size: .7rem; }
    .sr-tla { width: 2.4rem; font-weight: bold; flex-shrink: 0; letter-spacing: .03em; }
    .sr-gap { flex: 1; color: #666; font-size: .65rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sr-badge { font-size: .55rem; padding: 1px 3px; border-radius: 2px; flex-shrink: 0; font-weight: bold; letter-spacing: .03em; }
    .sr-badge-out { background: #3a0000; color: #e10600; }
    .sr-badge-pit { background: #3a3000; color: #ffd700; }
    .sr-badge-pto { background: #003a10; color: #00d2be; }
    .sr-badge-stp { background: #3a1a00; color: #ff8c00; }
  </style>
</head>
<body data-init="@get('/events')">
  <header>
    <h1>Gophormula</h1>
    <span id="active-session">no session selected</span>
    <span id="status-time">——:——:——</span>
    <nav class="status-bar">
      <span id="status-session" class="status-item"></span>
      <span class="status-item"><span class="status-label">Remaining</span><span id="status-remaining"></span></span>
      <span class="status-item"><span class="status-label">Lap</span><span id="status-lap">— / —</span></span>
      <span class="status-item"><span class="status-label">Track</span><span id="status-track">—</span></span>
      <span class="status-item"><span class="status-label">Weather</span><span id="status-weather">—</span></span>
    </nav>
  </header>
  <div class="layout">
    <aside id="sessions-aside" data-signals="{seek:''}">
      <h2>Live</h2>
      <button class="session-btn session-btn-live" data-on:click="@post('/live')">&#9679; Connect to F1 Live Timing</button>
      <h2 style="margin-top:.75rem">Replay</h2>
      <div style="padding:.25rem .25rem .5rem">
        <label style="display:block;font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:#555;margin-bottom:.3rem">Seek to</label>
        <input type="text" placeholder="e.g. 56m9s" data-bind="seek"
          style="width:100%;background:#1a1a1a;border:1px solid #333;color:#ccc;font:inherit;font-size:.8rem;padding:.3rem .4rem;border-radius:3px;box-sizing:border-box"/>
      </div>
      {{range .Sessions}}
      <button class="session-btn" data-on:click="@post('/replay?path={{.Path | urlEncode}}&seek='+$seek)">{{.Name}}</button>
      {{else}}
      <p style="color:#555;font-size:.8rem;padding:.5rem">No sessions found in {{$.DataDir}}</p>
      {{end}}
    </aside>
    <main>
      <div id="plot-panel">
        <svg id="track-plot" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet">
          <rect width="800" height="600" fill="#0a0a0a"/>
          <g id="cars"></g>
        </svg>
      </div>
      <div id="log-panel">
        <h2 onclick="(function(){var p=document.getElementById('log-panel');p.classList.toggle('collapsed');document.getElementById('log-toggle').textContent=p.classList.contains('collapsed')?'▲':'▼'})()">Log<span id="log-toggle">▼</span></h2>
        <div id="log"></div>
      </div>
    </main>
    <aside id="standings-aside">
      <h2>Standings</h2>
      <div id="standings-panel"></div>
    </aside>
  </div>
  <script>
    const log = document.getElementById('log');
    new MutationObserver(() => {
      if (!document.getElementById('log-panel').classList.contains('collapsed')) {
        log.scrollTop = log.scrollHeight;
      }
    }).observe(log, { childList: true });
  </script>
</body>
</html>
